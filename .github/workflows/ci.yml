name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      # The embedded allocator (assets/pack_alloc_module.wasm) is a committed
      # asset, so compilation/lint need no wasm build here.
      - name: Check
        run: nix develop --command cargo check --workspace

      - name: Clippy
        run: nix develop --command cargo clippy --workspace -- -D warnings

      - name: Format
        run: nix develop --command cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      # The pic_composition tests load prebuilt PIC side-modules from
      # packages/*/target (gitignored). Build each from its own dir so its
      # .cargo/config.toml PIC link flags apply — a repo-root --manifest-path build
      # silently drops them and produces a plain module missing __wasm_call_ctors.
      # (pack-alloc is a committed asset; only the PIC test fixtures need building.)
      - name: Build PIC test packages
        run: |
          nix develop --command bash -c '
            set -e
            for pkg in echo-pic hostcall-pic doubler-pic adder-pic; do
              (cd "packages/$pkg" && cargo build --release --target wasm32-unknown-unknown)
            done
          '

      - name: Test
        run: nix develop --command cargo test --workspace

      - name: Derive tests
        run: nix develop --command cargo test -p packr-abi --features derive
